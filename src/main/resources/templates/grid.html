<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
    	<title>Welcome</title>
		<style>
			.grid {
		  		display: grid;
		  		grid-template-columns: repeat(3, 50px);
		  		grid-gap: 5px;
			}

			.grid div {
		  		width: 50px;
		  		height: 50px;
			}
		</style>
	</head>
	<body>
		<div class="grid" id='gr'></div>
		<script th:inline="javascript">
			const count = [[${count}]];
			const colors = [[${colors}]];
			function createSquares(){
				var grid = document.getElementById('gr');
				for(var i = 0; i < count; i++){
					for(var j = 0; j < count; j++){
				    	var node = document.createElement("div");
				      	node.style.background = colors[i+'-'+j]??'blue';
				      	grid.appendChild(node);
				    }
				}
				document.getElementsByClassName('grid').item(0).style.gridTemplateColumns = 'repeat('+count+',50px)';
			}
		</script>
	</body>
</html>
